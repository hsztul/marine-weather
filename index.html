<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marine Weather Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="app" class="container mx-auto p-4">
    <h1 class="text-3xl font-bold mb-6">Marine Weather</h1>

    <div class="mb-4 border-b border-gray-200">
      <nav class="-mb-px flex space-x-4" role="tablist" aria-label="Weather Tabs">
        <button type="button" class="tab-btn border-b-2 border-blue-600 text-blue-600 px-3 py-2 text-sm font-medium" data-tab="marine" aria-selected="true">Marine Forecast</button>
        <button type="button" class="tab-btn border-b-2 border-transparent text-gray-600 hover:text-gray-800 hover:border-gray-300 px-3 py-2 text-sm font-medium" data-tab="windy" aria-selected="false">Windy Forecast</button>
        <button type="button" class="tab-btn border-b-2 border-transparent text-gray-600 hover:text-gray-800 hover:border-gray-300 px-3 py-2 text-sm font-medium" data-tab="radar" aria-selected="false">Radar</button>
      </nav>
    </div>

    <div id="tab-panels">
      <section id="tab-marine" role="tabpanel">
        <div id="loading" class="text-center">
          <p class="text-lg">Loading forecast...</p>
        </div>
        <div id="error" class="hidden text-red-500 text-center"></div>
        <div id="forecast-container" class="hidden">
          <div class="mb-4">
            <label for="zone-select" class="block text-sm font-medium text-gray-700 mb-2">Select Zone:</label>
            <div id="zone-nav"></div>
          </div>
          <div id="zone-forecast" class="bg-white rounded-lg shadow-md p-4"></div>
        </div>
      </section>

      <section id="tab-windy" role="tabpanel" class="hidden">
        <div
          data-windywidget="forecast"
          data-thememode="white"
          data-spotid="7813759"
          data-windunit="knots"
          data-tempunit="F"
          data-appid="b4ecac6222ef833416708274c19725f2"
          class="rounded-lg shadow-md">
        </div>
        <script async="true" data-cfasync="false" type="text/javascript" src="https://windy.app/widgets-code/forecast/windy_forecast_async.js?v168"></script>
      </section>

      <section id="tab-radar" role="tabpanel" class="hidden">
        <iframe src="https://www.rainviewer.com/map.html?loc=40.9270,-73.7524,4.366288765090307&oCS=1&c=3&o=83&lm=1&layer=radar&sm=1&sn=1" width="100%" frameborder="0" style="border:0;height:70vh;" allowfullscreen></iframe>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
